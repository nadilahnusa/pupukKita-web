<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun | Distribusi Pupuk</title>

  <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body>

<div class="auth-container">
  <div class="auth-card">

    <div class="logo">
      <img src="assets/img/logo.png" alt="Logo Web">
    </div>

    <h2>Buat Akun Baru</h2>
    <p class="subtitle">Silakan isi data dengan benar</p>

    <form id="signupForm" action="proses_signup.php" method="POST">

      <!-- NIK -->
      <div class="form-group">
        <label>NIK</label>
        <input type="text" id="nik" name="nik" placeholder="16 digit NIK">
        <small class="error-text" id="nikError"></small>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" name="email" placeholder="contoh@gmail.com">
        <small class="error-text" id="emailError"></small>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Password</label>

        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Minimal 8 karakter">
          <button type="button" class="toggle-password" id="togglePassword1">👁</button>
        </div>

        <!-- PASSWORD REQUIREMENTS -->
        <div class="password-rules">
          <p id="rule-length">• Minimal 8 karakter</p>
          <p id="rule-upper">• Huruf besar (A-Z)</p>
          <p id="rule-lower">• Huruf kecil (a-z)</p>
          <p id="rule-number">• Angka (0-9)</p>
          <p id="rule-symbol">• Simbol (!@#$ dll)</p>
        </div>

        <small class="error-text" id="passwordError"></small>
      </div>

      <!-- CONFIRM -->
      <div class="form-group">
        <label>Verifikasi Password</label>

        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Ulangi password">
          <button type="button" class="toggle-password" id="togglePassword2">👁</button>
        </div>

        <small class="error-text" id="confirmError"></small>
      </div>

      <button type="submit">Daftar</button>

    </form>

    <!-- OPSI LOGIN -->
    <p class="switch">
      Sudah punya akun?
      <a href="login.html">Login</a>
    </p>

  </div>
</div>

<script>
const form = document.getElementById("signupForm");

const nik = document.getElementById("nik");
const email = document.getElementById("email");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");

const nikError = document.getElementById("nikError");
const emailError = document.getElementById("emailError");
const passwordError = document.getElementById("passwordError");
const confirmError = document.getElementById("confirmError");

const toggle1 = document.getElementById("togglePassword1");
const toggle2 = document.getElementById("togglePassword2");

toggle1.addEventListener("click", function(){
  if(password.type === "password"){
    password.type = "text";
    toggle1.classList.add("active");
  } else{
    password.type = "password";
    toggle1.classList.remove("active");
  }
});

toggle2.addEventListener("click", function(){
  if(confirmPassword.type === "password"){
    confirmPassword.type = "text";
    toggle2.classList.add("active");
  } else{
    confirmPassword.type = "password";
    toggle2.classList.remove("active");
  }
});

const ruleLength = document.getElementById("rule-length");
const ruleUpper = document.getElementById("rule-upper");
const ruleLower = document.getElementById("rule-lower");
const ruleNumber = document.getElementById("rule-number");
const ruleSymbol = document.getElementById("rule-symbol");

password.addEventListener("input", function(){

  const value = password.value;

  // panjang
  if(value.length >= 8){
    ruleLength.classList.add("valid");
  } else {
    ruleLength.classList.remove("valid");
  }

  // huruf besar
  if(/[A-Z]/.test(value)){
    ruleUpper.classList.add("valid");
  } else {
    ruleUpper.classList.remove("valid");
  }

  // huruf kecil
  if(/[a-z]/.test(value)){
    ruleLower.classList.add("valid");
  } else {
    ruleLower.classList.remove("valid");
  }

  // angka
  if(/[0-9]/.test(value)){
    ruleNumber.classList.add("valid");
  } else {
    ruleNumber.classList.remove("valid");
  }

  // simbol
  if(/[^A-Za-z0-9]/.test(value)){
    ruleSymbol.classList.add("valid");
  } else {
    ruleSymbol.classList.remove("valid");
  }

});

/* ================= REALTIME ================= */

// NIK (16 digit angka)
nik.addEventListener("input", function() {
  nik.classList.remove("input-error");
  nikError.textContent = "";

  if (nik.value === "") return;

  if (!/^\d*$/.test(nik.value)) {
    nik.classList.add("input-error");
    nikError.textContent = "NIK hanya boleh angka.";
  }
  else if (nik.value.length > 16) {
    nik.value = nik.value.slice(0,16);
  }
  else if (nik.value.length < 16) {
    nik.classList.add("input-error");
    nikError.textContent = "NIK harus 16 digit.";
  }
});

// EMAIL (@gmail.com)
email.addEventListener("input", function() {
  email.classList.remove("input-error");
  emailError.textContent = "";

  if (email.value === "") return;

  if (!email.value.endsWith("@gmail.com")) {
    email.classList.add("input-error");
    emailError.textContent = "Email harus menggunakan @gmail.com";
  }
});

// PASSWORD STRONG
password.addEventListener("input", function() {

  password.classList.remove("input-error");
  passwordError.textContent = "";

  const value = password.value;

  if (value === "") return;

  if (value.length < 8) {
    password.classList.add("input-error");
    passwordError.textContent = "Minimal 8 karakter.";
  }
  else if (!/[a-z]/.test(value)) {
    password.classList.add("input-error");
    passwordError.textContent = "Harus ada huruf kecil.";
  }
  else if (!/[A-Z]/.test(value)) {
    password.classList.add("input-error");
    passwordError.textContent = "Harus ada huruf besar.";
  }
  else if (!/[0-9]/.test(value)) {
    password.classList.add("input-error");
    passwordError.textContent = "Harus ada angka.";
  }
  else if (!/[^A-Za-z0-9]/.test(value)) {
    password.classList.add("input-error");
    passwordError.textContent = "Harus ada simbol.";
  }
});

// CONFIRM PASSWORD
confirmPassword.addEventListener("input", function() {
  confirmPassword.classList.remove("input-error");
  confirmError.textContent = "";

  if (confirmPassword.value !== password.value) {
    confirmPassword.classList.add("input-error");
    confirmError.textContent = "Password tidak sama.";
  }
});

/* ================= FINAL CHECK ================= */

form.addEventListener("submit", function(e) {

  if (
    !/^\d{16}$/.test(nik.value) ||
    !email.value.endsWith("@gmail.com") ||
    password.value.length < 8 ||
    !/[a-z]/.test(password.value) ||
    !/[A-Z]/.test(password.value) ||
    !/[0-9]/.test(password.value) ||
    !/[^A-Za-z0-9]/.test(password.value) ||
    confirmPassword.value !== password.value
  ) {
    e.preventDefault();
  }

});
</script>

</body>
</html>
