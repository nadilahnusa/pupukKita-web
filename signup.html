<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Daftar Akun | Distribusi Pupuk</title>
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">

    <!-- LOGO -->
    <div class="logo">
      <img src="assets/img/logo.png" alt="Logo Web">
    </div>

    <h2>Buat Akun Baru</h2>
    <p class="subtitle">
      Daftarkan akun Anda untuk mengakses sistem distribusi pupuk
    </p>

    <form>
      <div class="form-group">
        <label>NIK</label>
        <input type="text" placeholder="Masukkan NIK" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Masukkan email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Masukkan password" required>
      </div>

      <div class="form-group">
        <label>Verifikasi Password</label>
        <input type="password" placeholder="Ulangi password" required>
      </div>

      <button type="submit">Daftar</button>
    </form>

    <p class="switch">
      Sudah punya akun?
      <a href="login.html">Login</a>
    </p>

  </div>
</div>

</body>
</html>
