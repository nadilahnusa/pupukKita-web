<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | PupuKita</title>

    <link href="./css/style.css" rel="stylesheet" />

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-bg-soft font-display min-h-screen flex items-center justify-center relative overflow-hidden"
  >
    <!-- BACKGROUND GLOW -->
    <div
      class="absolute w-[500px] h-[500px] bg-primary-lime/20 blur-[160px] rounded-full -top-40 -left-40"
    ></div>

    <div
      class="absolute w-[500px] h-[500px] bg-primary-forest/20 blur-[160px] rounded-full -bottom-40 -right-40"
    ></div>

    <div class="relative flex flex-col items-center gap-10">
      <!-- TITLE -->
      <div class="text-center">

        <h1 class="text-4xl font-bold text-primary-forest mt-4">
          Selamat Datang Kembali
        </h1>

        <p class="text-slate-500 mt-2">
          PupuKita: Sistem Distribusi Pupuk Dsn. Kowak
        </p>
      </div>

      <!-- LOGIN CARD -->
      <div
        class="w-[420px] bg-white/70 backdrop-blur-xl border border-white/60 shadow-xl rounded-[2rem] p-10"
      >
        <form id="loginForm" class="space-y-6">
          <!-- NIK -->
          <div>
            <label class="text-sm font-semibold text-slate-600">
              NIK
            </label>

            <div class="relative mt-2">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary-lime"
              >
                fingerprint
              </span>

              <input
                type="text"
                id="nik"
                placeholder="16-digit identification"
                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:border-primary-lime focus:ring-2 focus:ring-primary-lime/20 outline-none transition"
              />
            </div>

            <small id="nikError" class="text-red-500 text-xs"></small>
          </div>

          <!-- PASSWORD -->
          <div>
            <label class="text-sm font-semibold text-slate-600">
              Password
            </label>

            <div class="relative mt-2">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary-lime"
              >
                lock
              </span>

              <input
                type="password"
                id="password"
                placeholder="••••••••"
                class="w-full pl-10 pr-10 py-3 rounded-xl border border-slate-200 focus:border-primary-lime focus:ring-2 focus:ring-primary-lime/20 outline-none transition"
              />

              <button
                type="button"
                id="togglePassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary-lime"
              >
                <span class="material-symbols-outlined"> visibility </span>
              </button>
            </div>

            <small id="passwordError" class="text-red-500 text-xs"></small>
          </div>

          <!-- RESET PASSWORD -->
          <div class="text-right text-sm">
            <a href="#" class="text-primary-lime hover:underline">
              Lupa password?
            </a>
          </div>

          <!-- LOGIN BUTTON -->
          <button
            type="submit"
            class="w-full py-4 rounded-xl bg-gradient-to-r from-primary-lime to-primary-forest text-white font-semibold text-sm tracking-wide hover:scale-[1.02] transition-all"
          >
            Masuk
          </button>

      <!-- FOOTER -->
      <p class="text-xs text-slate-400 text-center">
        © 2026 PupuKita
    </div>

    <!-- JAVASCRIPT -->
    <script>
      const form = document.getElementById("loginForm");
      const nik = document.getElementById("nik");
      const password = document.getElementById("password");

      const nikError = document.getElementById("nikError");
      const passwordError = document.getElementById("passwordError");

      const toggle = document.getElementById("togglePassword");

      // toggle password
      toggle.addEventListener("click", function () {
        if (password.type === "password") {
          password.type = "text";
        } else {
          password.type = "password";
        }
      });

      // validasi saat submit
      form.addEventListener("submit", function (e) {
        let valid = true;

        nikError.textContent = "";
        passwordError.textContent = "";

        if (!/^\d{16}$/.test(nik.value)) {
          nikError.textContent = "NIK harus 16 digit angka.";
          valid = false;
        }

        if (password.value.trim() === "") {
          passwordError.textContent = "Password wajib diisi.";
          valid = false;
        }

        if (!valid) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
